name: Morning Brief — USD/VND

# Chạy 05:00 ICT mỗi ngày = 22:00 UTC (UTC+7).
# LƯU Ý: GitHub chỉ chạy scheduled workflow trên nhánh MẶC ĐỊNH của repo,
# nên file này phải được merge vào nhánh mặc định mới kích hoạt theo lịch.
# Giờ chạy có thể trễ vài phút do hàng đợi của GitHub.
on:
  schedule:
    - cron: '0 22 * * *'
  workflow_dispatch: {}   # cho phép chạy tay để test

permissions:
  contents: write          # để commit báo cáo vào reports/

jobs:
  morning-brief:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Claude Code
        run: npm install -g @anthropic-ai/claude-code

      - name: Run morning brief (PB-DAILY)
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          TODAY=$(TZ=Asia/Ho_Chi_Minh date +%F)
          claude -p "Đọc CLAUDE.md, system/playbooks.md (PB-DAILY), system/sources.md, \
          system/watchlist.md, system/calendar.md, agents/journalist/memory.md và memory.md. \
          Chạy báo cáo sáng USD/VND cho ngày $TODAY theo PB-DAILY: \
          (1) Journalist chấm dự báo nào tới hạn TRƯỚC (luật #13); \
          (2) gom số qua đêm theo sources.md: tỷ giá TT SBV + spot + chợ đen + room tới trần, \
          DXY, USD/CNH, SOFR, và (nếu là mode swap) LNH O/N + swap points 1M/3M/6M + OMO/tín phiếu; \
          (3) nêu 'đổi gì qua đêm + 1-2 điểm đáng chú ý + watch level'; \
          (4) kiểm tra ngưỡng watchlist (cảnh báo nếu chạm); (5) sự kiện 48h tới từ calendar. \
          Ngắn, ra quyết định (luật #12). Ghi theo template reports/README.md vào reports/$TODAY.md. \
          Số thiếu thì ghi rõ THIẾU + hạ độ tin, KHÔNG bịa/ước lượng rồi kết luận như thật (luật #8)." \
          --permission-mode acceptEdits --allowedTools "Read,Write,WebSearch,WebFetch"

      - name: Commit report
        run: |
          TODAY=$(TZ=Asia/Ho_Chi_Minh date +%F)
          git config user.name "swap-research-bot"
          git config user.email "noreply@github.com"
          if [ -n "$(git status --porcelain reports/)" ]; then
            git add reports/
            git commit -m "report: morning brief $TODAY"
            git push
          else
            echo "Không có báo cáo mới để commit."
          fi
